<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8ecf5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boltGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2551;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main background circle -->
  <rect x="0" y="0" width="300" height="200" fill="url(#bgGradient)" rx="10"/>
  
  <!-- Left side - Lightning bolt -->
  <g>
    <!-- Glow effect -->
    <circle cx="50" cy="100" r="45" fill="none" stroke="#8b2c7f" stroke-width="1" opacity="0.2"/>
    
    <!-- Lightning bolt - Main -->
    <polygon points="50,30 35,70 48,70 35,145 65,85 52,85 62,35" fill="url(#boltGradient)" stroke="#1a3a7a" stroke-width="0.5"/>
    
    <!-- Lightning bolt - Accent (Purple) -->
    <polygon points="52,70 58,55 55,70 58,85" fill="#8b2c7f"/>
  </g>
  
  <!-- Right side - Text -->
  <g>
    <!-- "Anant" text -->
    <text x="130" y="85" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1a3a7a">
      Anant
    </text>
    
    <!-- "Electrical" text -->
    <text x="130" y="130" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#8b2c7f">
      Electrical
    </text>
    
    <!-- Decorative line -->
    <line x1="130" y1="138" x2="280" y2="138" stroke="#1a3a7a" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom accent -->
  <rect x="0" y="190" width="300" height="10" fill="#8b2c7f" rx="5"/>
</svg>
